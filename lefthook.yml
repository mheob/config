commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-commit:
  commands:
    format:
      glob: "**"
      run: bunx oxfmt --check --no-error-on-unmatched-pattern {staged_files}
    lint:
      glob: "**"
      run: bunx oxlint --no-error-on-unmatched-pattern {staged_files}

pre-push:
  commands:
    changeset-status:
      skip:
        - run: 'test -n "$CI"'
      run: bunx changeset status --since main
